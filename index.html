<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>YTDLP Importer</title>
    <style>
        body {
            background-color: #232323;
            color: #ccc;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            padding: 10px;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            font-size: 14px;
            color: #eee;
            margin: 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #444;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            background-color: #1a1a1a;
            border: 1px solid #444;
            color: #eee;
            padding: 6px;
            border-radius: 3px;
            box-sizing: border-box;
            outline: none;
        }
        
        input[type="text"]:focus {
            border-color: #2a82da;
        }

        button {
            background-color: #2a82da;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #3b93eb;
        }

        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background-color: #444;
        }
        
        .btn-secondary:hover {
            background-color: #555;
        }

        .output-row {
            display: flex;
            gap: 5px;
            align-items: stretch;
        }
        
        .output-row input {
            flex-grow: 1;
        }

        #logArea {
            flex-grow: 1;
            background-color: #111;
            border: 1px solid #333;
            color: #0f0;
            font-family: monospace;
            padding: 8px;
            border-radius: 3px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 11px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h2>Script Importer</h2>
    
    <div>
        <label for="docUrl">Google Doc Link:</label>
        <input type="text" id="docUrl" placeholder="https://docs.google.com/document/d/..." />
    </div>

    <div>
        <label>Output Folder:</label>
        <div class="output-row">
            <input type="text" id="outputFolder" readonly placeholder="Choose a folder..." />
            <button class="btn-secondary" id="btnSelectFolder">Browse</button>
        </div>
    </div>
    
    <div>
        <button id="btnStart" style="width: 100%">Download & Import</button>
    </div>

    <div style="flex-grow: 1; display: flex; flex-direction: column;">
        <label>Status Log:</label>
        <div id="logArea"></div>
    </div>

    <script src="js/CSInterface.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
